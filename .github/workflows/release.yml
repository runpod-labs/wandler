name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build server
        run: npm run build
        working-directory: server

      - name: Run tests
        run: npm run test
        working-directory: server

      - name: Typecheck server
        run: npm run typecheck
        working-directory: server

      - name: Check for changesets
        id: changesets_check
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1 && [ "$(ls .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
          else
            echo "has_changesets=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release PR
        if: steps.changesets_check.outputs.has_changesets == 'true'
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version is published
        if: steps.changesets_check.outputs.has_changesets == 'false'
        id: check_publish
        working-directory: server
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "local_version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          if npm view wandler@$LOCAL_VERSION version 2>/dev/null; then
            echo "needs_publish=false" >> $GITHUB_OUTPUT
          else
            echo "needs_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Exchange OIDC token for npm publish token
        if: steps.changesets_check.outputs.has_changesets == 'false' && steps.check_publish.outputs.needs_publish == 'true'
        id: npm_oidc
        run: |
          # Get OIDC token from GitHub Actions (audience must be npm:<registry-host>)
          OIDC_TOKEN=$(curl -sS \
            -H "Accept: application/json" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" | jq -r '.value')

          # Exchange OIDC token for npm publish token
          NPM_TOKEN=$(curl -sS -X POST \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/wandler" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -d '{}' | jq -r '.token')

          if [ -z "$NPM_TOKEN" ] || [ "$NPM_TOKEN" = "null" ]; then
            echo "Failed to get npm token via OIDC"
            curl -sS -X POST \
              "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/wandler" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OIDC_TOKEN" \
              -d '{}' | jq 'del(.token)'
            exit 1
          fi

          echo "::add-mask::$NPM_TOKEN"
          echo "npm_token=$NPM_TOKEN" >> $GITHUB_OUTPUT

      - name: Publish to npm
        if: steps.changesets_check.outputs.has_changesets == 'false' && steps.check_publish.outputs.needs_publish == 'true'
        working-directory: server
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm_oidc.outputs.npm_token }}

      - name: Create GitHub Release
        if: steps.changesets_check.outputs.has_changesets == 'false' && steps.check_publish.outputs.needs_publish == 'true'
        run: |
          VERSION=${{ steps.check_publish.outputs.local_version }}
          gh release create "v$VERSION" --title "v$VERSION" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
